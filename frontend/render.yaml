# render.yaml
services:
  - type: web
    name: kg-jobs-backend
    runtime: node
    repo: https://github.com/Hao186188/kg-jobs # Đường dẫn repo
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: MONGODB_URI
        sync: false  #tự nhập giá trị này trên Dashboard Render
      - key: JWT_SECRET
        generateValue: true  # Render tự tạo secret
      - key: JWT_EXPIRE
        value: 7d
      - key: NODE_ENV
        value: production
